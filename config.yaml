# Frugal Coder - 用户配置

provider:
  # === 便宜模型配置（SIMPLE/COMPLEX 用） ===
  api_base: "https://YOUR_UPSTREAM_API/v1"
  api_key: "YOUR_API_KEY"
  model: "YOUR_MODEL"

gateway:
  port: 4010

# === 主模型配置（direct 模式和 NEEDS_TOOLS 用）===
